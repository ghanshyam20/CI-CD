name: Health check

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check application health
        uses: jtalk/url-health-check-action@v4
        with:
          url: https://fs-pokedex-main.fly.dev
          max-attempts: 3
          retry-delay: 5s