# fly.toml app configuration file generated for fs-pokedex-main on 2026-04-18T14:31:33+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fs-pokedex-main'
primary_region = 'arn'

[build]

[http_service]
  internal_port = 5001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.http_checks]]
    path = "/health"
    interval = "10s"
    timeout = "2s"
    grace_period="5s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024


[deploy]
  strategy = "canary"


